<div class="row p-3 mb-3">
  <h2 class=" fw-bold mb-5">Dodaj nawyk</h2>
  <input [(ngModel)]="habit.name" class="form-control mb-4" placeholder="Nazwa nawyku">
  <input [(ngModel)]="habit.desc" class="form-control mb-3" maxlength="20" placeholder="Opis">
  <button class="btn btn-success mx-auto d-block" style="max-width: 100px;" (click)="add()">Dodaj</button>
</div>

<div class="row justify-content-center align-items-center">
  <div class="col-auto">
    <img src="assets/image.png" alt="habit" style="max-height: 300px; max-width: 300px;">
  </div>
</div>
